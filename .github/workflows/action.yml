name: Automatic Tile Generation and Release - Germany + Benelux + France

permissions:
  contents: write

on:
  schedule:
    - cron: '30 0 1 * *'  # Monthly on the 1st at 00:30 UTC
  workflow_dispatch:

jobs:
  # Single matrix of all regional builds. Each job:
  #   1. Checks out the repo to pick up admin-overlays/west-europe.osm.pbf
  #   2. Downloads its regional Geofabrik PBF
  #   3. Builds admins from (overlay + regional PBF) so Valhalla has the L2
  #      country relation it needs for drive_on_right (regional extracts are
  #      clipped to the region polygon and don't carry the country relation).
  #   4. Builds tiles, applies OpenStreetMapSpeeds defaults, packages.
  #
  # The overlay carries hand-built L2 polygons for DE/FR/NL/BE/LU with the
  # right ISO3166-1 codes. See tools/build-admin-overlay.py to regenerate.
  # This replaces the previous pattern of downloading germany-latest.osm.pbf
  # (5 GB) in a separate generate_admins job and sharing via artifact.
  generate_tiles:
    runs-on: self-hosted
    container:
        image: ghcr.io/valhalla/valhalla:3.6.3
        options: --privileged --cgroupns host --user root
    strategy:
      fail-fast: false
      matrix:
        region:
          - { name: "baden-wuerttemberg", url: "https://download.geofabrik.de/europe/germany/baden-wuerttemberg-latest.osm.pbf" }
          - { name: "bayern", url: "https://download.geofabrik.de/europe/germany/bayern-latest.osm.pbf" }
          # Berlin's Geofabrik extract is fully contained in Brandenburg's
          # (Brandenburg surrounds Berlin geographically and Geofabrik's
          # padded bbox makes the two extracts produce identical node/way/
          # relation sets for Berlin). Feeding both to valhalla_build_tiles
          # creates duplicate edges for every Berlin way, exploding maneuver
          # counts at route time. So we use just the Brandenburg PBF but
          # label the output `berlin_brandenburg` to reflect coverage.
          - { name: "berlin_brandenburg", url: "https://download.geofabrik.de/europe/germany/brandenburg-latest.osm.pbf" }
          - { name: "bremen", url: "https://download.geofabrik.de/europe/germany/bremen-latest.osm.pbf" }
          - { name: "hamburg", url: "https://download.geofabrik.de/europe/germany/hamburg-latest.osm.pbf" }
          - { name: "hessen", url: "https://download.geofabrik.de/europe/germany/hessen-latest.osm.pbf" }
          - { name: "mecklenburg-vorpommern", url: "https://download.geofabrik.de/europe/germany/mecklenburg-vorpommern-latest.osm.pbf" }
          - { name: "niedersachsen", label: "Niedersachsen (incl. Bremen)", url: "https://download.geofabrik.de/europe/germany/niedersachsen-latest.osm.pbf" }
          - { name: "nordrhein-westfalen", url: "https://download.geofabrik.de/europe/germany/nordrhein-westfalen-latest.osm.pbf" }
          - { name: "rheinland-pfalz", url: "https://download.geofabrik.de/europe/germany/rheinland-pfalz-latest.osm.pbf" }
          - { name: "saarland", url: "https://download.geofabrik.de/europe/germany/saarland-latest.osm.pbf" }
          - { name: "sachsen", url: "https://download.geofabrik.de/europe/germany/sachsen-latest.osm.pbf" }
          - { name: "sachsen-anhalt", url: "https://download.geofabrik.de/europe/germany/sachsen-anhalt-latest.osm.pbf" }
          - { name: "schleswig-holstein", url: "https://download.geofabrik.de/europe/germany/schleswig-holstein-latest.osm.pbf" }
          - { name: "thueringen", url: "https://download.geofabrik.de/europe/germany/thueringen-latest.osm.pbf" }
          - { name: "netherlands", url: "https://download.geofabrik.de/europe/netherlands-latest.osm.pbf" }
          - { name: "belgium", url: "https://download.geofabrik.de/europe/belgium-latest.osm.pbf" }
          - { name: "luxembourg", url: "https://download.geofabrik.de/europe/luxembourg-latest.osm.pbf" }
          - { name: "ile-de-france", url: "https://download.geofabrik.de/europe/france/ile-de-france-latest.osm.pbf" }
    steps:

    - name: Checkout repository (for admin overlay)
      uses: actions/checkout@v4

    - name: Download Dependencies
      run: apt install wget -y

    - name: Download OSM PBF for ${{ matrix.region.name }}
      run: |
        echo "Downloading ${{ matrix.region.name }} PBF file..."
        pbf=$(basename "${{ matrix.region.url }}")
        wget -q -O "$pbf" "${{ matrix.region.url }}"
        echo "Download completed for ${{ matrix.region.name }}"
        ls -la *.osm.pbf

    - name: Fetch community default_speeds.json
      run: wget -q https://raw.githubusercontent.com/OpenStreetMapSpeeds/schema/master/default_speeds.json

    - name: Mjolnir Build for ${{ matrix.region.name }}
      run: |
        echo "Building Valhalla configuration for ${{ matrix.region.name }}..."
        valhalla_build_config \
          --mjolnir-include-bicycle false \
          --mjolnir-include-pedestrian false \
          --mjolnir-default-speeds-config $(pwd)/default_speeds.json \
          | tee valhalla.json

        pbf=$(basename "${{ matrix.region.url }}")
        mkdir -p /data/valhalla

        echo "Building admin DB from overlay + regional PBF..."
        valhalla_build_admins -c valhalla.json \
          admin-overlays/west-europe.osm.pbf \
          "$pbf"

        echo "Building tiles for ${{ matrix.region.name }}..."
        valhalla_build_tiles -c valhalla.json "$pbf"

        echo "Applying OpenStreetMapSpeeds default speeds to tiles..."
        valhalla_assign_speeds -c valhalla.json

        echo "Building extract for ${{ matrix.region.name }}..."
        valhalla_build_extract -c valhalla.json

        echo "Creating tarball for ${{ matrix.region.name }}..."
        mv /data/valhalla/tiles.tar /data/valhalla/valhalla_tiles_${{ matrix.region.name }}.tar

        echo "Tile generation completed for ${{ matrix.region.name }}"
        ls -la /data/valhalla/

    - name: Copy and Fix Permissions for ${{ matrix.region.name }}
      run: |
        mkdir -p /tmp/artifacts
        cp /data/valhalla/valhalla_tiles_${{ matrix.region.name }}.tar /tmp/artifacts/
        chown $(whoami):$(whoami) /tmp/artifacts/valhalla_tiles_${{ matrix.region.name }}.tar
        chmod 666 /tmp/artifacts/valhalla_tiles_${{ matrix.region.name }}.tar
        ls -la /tmp/artifacts/

    - name: Upload Build Artifact for ${{ matrix.region.name }}
      uses: actions/upload-artifact@v7
      with:
        name: valhalla_tiles_${{ matrix.region.name }}
        path: /tmp/artifacts/valhalla_tiles_${{ matrix.region.name }}.tar

  release:
    needs: [generate_tiles]
    runs-on: ubuntu-latest
    # Only publish to the `latest` release from main. Workflow runs on feature
    # branches still produce artifacts (downloadable from the workflow run UI)
    # but must not overwrite the production release.
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download tile artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: valhalla_tiles_*

      - name: List All Artifacts
        run: |
          echo "Listing all downloaded artifacts:"
          find artifacts -name "*.tar" -type f

      - name: Create Automatic Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: "Valhalla Tiles - Germany + Benelux + France"
          prerelease: false
          make_latest: true
          files: |
            artifacts/**/*.tar
